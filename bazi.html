<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="mascot.png">
  <title>metaphysics.it.com — BaZi Strategic Profile</title>
  <meta name="description" content="A clean, 1-page BaZi-inspired Strategic Profile: your Day Master, Five-Element resource matrix, and actionable nudges. Private, 100% in your browser.">
  <link rel="canonical" href="https://metaphysics.it.com/bazi.html">
  <link rel="stylesheet" href="style.css">
  <style>
    /* page parity with index/ze-ri (uses style.css variables + header) */
    :root {
      --bg: #0f0f14; --surface: #181820; --surface-2: #1f1f29; --border: rgba(255,255,255,.08);
      --text: #f2f2f7; --muted: #aaa7b3; --accent: #ff8a65; --accent-2: #ff6e40;
      --good: #81c784; --bad: #e57373; --chip-bg: rgba(255,255,255,.06);
      --wood: #81c784; --fire: #ff8a65; --earth: #ffd54f; --metal: #e0e0e0; --water: #64b5f6;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at -10% -10%, rgba(255,110,64,.12), transparent),
        radial-gradient(1000px 500px at 110% 10%, rgba(255,138,101,.1), transparent),
        var(--bg);
      color: var(--text); line-height: 1.55;
    }
    header { max-width: 1100px; margin: 0 auto; padding: 22px 0 6px; }
    .nav { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .nav-left { display: flex; align-items: center; gap: .7rem; flex-wrap: wrap; min-width: 0; }
    .nav-right { display: flex; align-items: flex-start; justify-content: flex-end; flex-shrink: 0; }
    .nav-right select { width: auto; min-width: 110px; }
    .logo { width: 44px; height: 44px; display: inline-flex; }
    .brand-img { object-fit: contain; border-radius: 50%; }
    .brand { color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: .6rem; font-weight: 750; font-size: 1.05rem; }
    .tag { color: var(--muted); font-size: .88rem; margin-left: .6rem; }
    .back-link { display: inline-flex; align-items: center; gap: .4rem; padding: .42rem .68rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); text-decoration: none; font-size: .85rem; }
    .wrap { width: 100%; max-width: 1100px; margin: 0 auto; padding: 18px 0 110px; }
    @media (min-width: 760px) { .wrap { padding-left: 22px; padding-right: 22px; } }

    .card { background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-top: 16px; backdrop-filter: blur(8px); }
    @media (min-width: 760px) { .card { padding: 18px; } }
    .row { display: grid; gap: .75rem; grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 760px) { .row { grid-template-columns: 1fr; } }
    label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .25rem; }
    input, select { width: 100%; padding: .6rem .8rem; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text); font: inherit; outline: none; transition: border-color .15s ease, box-shadow .15s ease; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255,110,64,.15); }
    button { width: 100%; padding: .7rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: transform .04s ease, opacity .15s ease; }
    button.primary { background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #fff; }
    button.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    button:active { transform: translateY(1px); }
    .section-title { font-family: "Noto Serif SC", "Songti SC", Georgia, "Times New Roman", serif; font-size: 1.4rem; margin: 0 0 .3rem; }
    .intro { color: var(--muted); font-size: .92rem; }
    .intro strong { color: var(--text); }

    /* ---- report (1-page dashboard) ---- */
    #baziReport { display: none; }
    .report-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: .4rem; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: .6rem; }
    #reportMeta { font-size: .9rem; color: var(--muted); }
    #reportMeta strong, #reportMeta .name { color: var(--text); font-weight: 700; }
    .report-grid { display: grid; gap: .75rem; }
    @media (min-width: 860px) { .report-grid { grid-template-columns: 1fr 1.25fr; } .segC { grid-column: 1 / -1; } }
    .seg { border: 1px solid var(--border); border-radius: 16px; padding: 14px; background: rgba(255,255,255,.025); }
    .seg h3 { margin: 0 0 .55rem; font-size: 1.05rem; color: var(--accent); }
    .dm-badge { display: flex; align-items: baseline; gap: .6rem; flex-wrap: wrap; }
    .dm-polarity { font-size: 1.6rem; font-weight: 800; }
    .dm-el { color: var(--muted); font-size: .95rem; }
    .signature { margin: .55rem 0; font-size: 1.05rem; line-height: 1.45; font-weight: 600; }
    .pillars-line { font-size: .82rem; color: var(--muted); }

    .matrix-row { display: grid; grid-template-columns: 92px 1fr 52px 150px; align-items: center; gap: .5rem; margin: .35rem 0; }
    @media (max-width: 520px) { .matrix-row { grid-template-columns: 78px 1fr 46px; } .matrix-flag { grid-column: 2 / -1; text-align: left; } }
    .matrix-label { font-weight: 600; }
    .matrix-track { height: 12px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
    .matrix-fill { height: 100%; border-radius: 999px; }
    .matrix-val { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
    .matrix-flag { font-size: .72rem; }
    .flag-dominant { color: var(--good); font-weight: 700; }
    .flag-bottleneck { color: var(--bad); font-weight: 700; }
    .matrix-summary { margin-top: .55rem; font-size: .85rem; color: var(--text); }
    .nudges { margin: 0; padding-left: 1.1rem; }
    .nudges li { margin: .4rem 0; line-height: 1.5; }
    .print-bar { display: flex; gap: .6rem; margin-top: .8rem; }
    .print-bar button { width: auto; padding: .55rem 1rem; }

    .footer-spacer { height: 90px; }
    footer.footer-bar, footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,20,26,.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-top: 1px solid var(--border); padding: 14px 18px 16px; text-align: center; z-index: 100; }
    .footer-inner { display: inline-flex; align-items: center; gap: 1.2rem; }
    .social-bar { display: inline-flex; align-items: center; justify-content: center; gap: 1.2rem; flex-wrap: wrap; }
    .social-circle { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); text-decoration: none; box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 8px 18px rgba(0,0,0,.35); }
    .social-icon { width: 18px; height: 18px; stroke: currentColor; fill: none; }
    .social-home .social-icon { color: #ff8a65; }
    .social-faq .social-icon { color: #9fa8da; }
    .social-ig .social-icon { color: #ff7eb3; }

    /* ---- print: clean, black-on-white 1-page A4 ---- */
    @media print {
      @page { size: A4 portrait; margin: 14mm 14mm; }
      :root, html, body {
        background: #fff !important; color: #000 !important;
        font-family: Georgia, "Times New Roman", serif !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      header, .nav, .back-link, .nav-right, .footer-bar, footer,
      .no-print, #inputCard, #baziForm, .print-bar, .footer-spacer { display: none !important; }
      .wrap { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
      .card { border: none !important; background: #fff !important; box-shadow: none !important; backdrop-filter: none !important; margin: 0 !important; padding: 0 !important; }
      #baziReport { display: block !important; page-break-inside: avoid; }
      .seg { border: 1px solid #bbb !important; background: #fff !important; break-inside: avoid; }
      .seg h3 { color: #000 !important; border-bottom: 1px solid #000; padding-bottom: .25rem; }
      .report-head { border-bottom: 2px solid #000 !important; }
      #reportMeta, .pillars-line, .intro { color: #000 !important; }
      .dm-polarity { color: #000 !important; }
      .matrix-track { border: 1px solid #999; background: #fff !important; }
      .matrix-fill { opacity: 1 !important; }
      .matrix-val, .flag-dominant, .flag-bottleneck { color: #000 !important; }
      .nudges li { color: #000 !important; }
      a { color: #000 !important; text-decoration: none; }
    }
  </style>
</head>
<body>

<header>
  <nav class="nav">
    <div class="nav-left">
      <a href="index.html" class="back-link">← Back</a>
      <a class="brand" href="index.html">

        <span class="brand">metaphysics<span>.</span>it<span>.com</span>

    <div class="nav-right">
      <select id="visitorLang" aria-label="Language">
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="both">中英</option>
      </select>

  </nav>
</header>

<div class="wrap">

  <!-- Input card (hidden on print) -->
  <section class="card" id="inputCard">
    <p class="intro" style="margin-top:0;">
      <strong data-i18n="bazi_intro_1">What this page does:</strong>
      <span data-i18n="bazi_intro_2" data-i18n-html="1">It turns your birthday and birth time into a simple 5-element Strategic Profile — a clean, private 1-page snapshot.</span>

    <div id="baziForm">

      <div class="row" style="margin-top:.75rem;">
        <div><label for="visitorJob" data-i18n="index_job">Job Title</label><input type="text" id="visitorJob" placeholder="e.g. IT Project Manager" data-i18n-placeholder="index_job_placeholder"></div>
        <div><label for="visitorCountry" data-i18n="index_country">Country</label><input type="text" id="visitorCountry" placeholder="Singapore / 新加坡" data-i18n-placeholder="index_country_placeholder"></div>
      </div>
      <div class="row" style="margin-top:.75rem;">
        <div><label for="visitorTimezone" data-i18n="index_timezone">Timezone</label><select id="visitorTimezone"></select></div>
        <div></div>
      </div>
      <button id="generateBtn" class="primary" style="margin-top:.6rem;" type="button" data-i18n="bazi_generate">Generate Strategic Profile</button>
    </div>
  </section>

  <!-- 1-page report -->
  <section class="card" id="baziReport" aria-live="polite">
    <div class="report-head">
      <div>
        <h2 class="section-title" style="margin:0;">Strategic Profile · 战略命盘</h2>
        <div id="reportMeta"></div>
      </div>
    </div>

    <div class="report-grid">
      <div class="seg" id="segA"></div>
      <div class="seg" id="segB"></div>
      <div class="seg" id="segC"></div>
    </div>

    <div class="print-bar no-print">
      <button id="exportPdf" class="secondary" type="button" data-i18n="bazi_export_pdf">Export Strategic Profile (PDF)</button>
    </div>
    <p class="intro no-print" style="font-size:.78rem; margin-top:.5rem;">
      <span data-i18n="bazi_disclaimer">Symbolic guidance for reflection, not prediction. Your data stays in this browser.</span>
    </p>
  </section>

</div>
