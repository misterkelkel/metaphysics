  <style>
    :root {
      --bg: #0f0f14;
      --surface: #181820;
      --surface-2: #1f1f29;
      --border: rgba(255,255,255,.08);
      --text: #f2f2f7;
      --muted: #aaa7b3;
      --accent: #ff8a65;
      --accent-2: #ff6e40;
      --wood: #81c784;
      --fire: #ff8a65;
      --earth: #ffd54f;
      --metal: #e0e0e0;
      --water: #4fc3f7;
      --chip-bg: rgba(255,255,255,.06);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(1200px 600px at -10% -10%, rgba(255,110,64,.12), transparent), radial-gradient(1000px 500px at 110% 10%, rgba(255,138,101,.1), transparent), var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    header { max-width: 1100px; margin: 0 auto; padding: 24px 0 6px; }
    header h1 {
      font-family: "Noto Serif SC", "Songti SC", Georgia, "Times New Roman", serif;
      font-size: 1.75rem;
      letter-spacing: -0.01em;
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: .65rem;
    }
    header h1 span { color: var(--accent); }
    header a.back { color: var(--muted); text-decoration: none; font-size: .9rem; margin-left: .75rem; }
    .subtitle { color: var(--muted); margin-top: .3rem; font-size: .95rem; }
    .wrap { width: 100%; max-width: 1100px; margin: 0 auto; padding: 18px 0 110px; }
    @media (min-width: 760px) { .wrap { padding-left: 22px; padding-right: 22px; } }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-top: 16px;
      backdrop-filter: blur(8px);
    }
    @media (min-width: 760px) { .card { padding: 18px; } }
    .row { display: grid; gap: .75rem; grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 760px) { .row { grid-template-columns: 1fr; } }
    label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .25rem; }
    input, select {
      width: 100%;
      padding: .6rem .8rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255,110,64,.15); }
    button {
      width: 100%;
      padding: .7rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform .04s ease, opacity .15s ease;
    }
    button:active { transform: translateY(1px); }
    .bar { display:flex; justify-content:space-between; gap:1rem; align-items:center; flex-wrap: wrap; }
    @media (max-width: 760px) { .bar { flex-direction: column; align-items: flex-start; } }
    .pill { display:inline-flex; align-items:center; gap:.35rem; padding: .35rem .7rem; border-radius: 999px; background: var(--chip-bg); border: 1px solid var(--border); font-size: .82rem; color: var(--text); }
    .grid { display:grid; gap: .75rem; grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    .sign-card { border-radius: 20px; padding: 16px; border: 1px solid var(--border); background: rgba(255,255,255,.025); }
    .sign-card h2 { margin: 0 0 .4rem; font-size: 1.15rem; }
    .sign-card .meta { font-size: .82rem; color: var(--muted); }
    .sign-card .body { margin-top: .5rem; font-size: .92rem; color: var(--muted); }
    .animal { font-size: 2rem; margin: .25rem 0; }
    .intro { color: var(--muted); font-size: .92rem; }
    .intro strong { color: var(--text); }
    .footer-spacer { height: 90px; }
    footer.footer-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(20,20,26,.85);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 14px 18px 16px;
      text-align: center;
      z-index: 100;
    }
    .footer-inner { display: inline-flex; align-items: center; gap: 1.2rem; }
    .social-circle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text); text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 8px 18px rgba(0,0,0,.35);
      transition: transform .15s ease, background .15s ease;
    }
    .social-circle:hover { transform: translateY(-2px); background: #25252f; }
    .social-circle svg { width: 19px; height: 19px; fill: currentColor; }
    .kicker { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>
      <img src="mascot.png" alt="mascot" style="width:44px;height:44px;border-radius:14px;background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), rgba(255,255,255,.02));border:1px solid var(--border);box-shadow:0 6px 16px rgba(0,0,0,.35);">
      metaphysics<span>.</span>it<span>.com</span>
      <a class="back" href="index.html">← Back</a>
    </h1>
    <p class="subtitle">Horoscope · East + West</p>
  </header>

  <div class="wrap">
    <section class="card">
      <p class="intro" style="margin-top:0;">
        <strong>Two views from one birthday:</strong> your Eastern Chinese zodiac animal and your Western sun sign.
      </p>
      <div class="row">
        <div><label for="visitorName">Name</label><input type="text" id="visitorName" placeholder="Your name"></div>
        <div><label for="visitorDob">Date of birth</label><input type="date" id="visitorDob"></div>
      </div>
      <div class="row" style="margin-top:.75rem;">
        <div><label for="gender">Gender</label><select id="gender"><option value="">— select —</option><option value="male">Male</option><option value="female">Female</option></select></div>
        <div><label for="country">Country</label><input type="text" id="country" placeholder="Country"></div>
      </div>
      <div class="row" style="margin-top:.75rem;">
        <div><label for="job">Job</label><input type="text" id="job" placeholder="Job"></div>
        <div><label for="tob">Time of birth</label><input type="time" id="tob"></div>
      </div>
      <button id="showBtn" class="secondary" style="margin-top:.6rem;" type="button">Show my signs</button>
    </section>

    <section class="card" id="eastCard" style="display:none;">
      <div class="bar">
        <div class="bar-meta"><strong>Eastern · Chinese zodiac</strong></div>
        <div class="pill" id="eastPill"></div>
      </div>
      <div class="grid" style="margin-top:.75rem;">
        <div class="sign-card">
          <div class="kicker">General</div>
          <div class="animal" id="animalEmoji"></div>
          <div class="meta" id="animalMeta"></div>
          <p class="body" id="animalBody"></p>
        </div>
        <div class="sign-card">
          <div class="kicker">Suggested use</div>
          <div class="meta" id="animalUseTitle" style="margin-top:.25rem;"></div>
          <p class="body" id="animalUseBody"></p>
        </div>
      </div>
    </section>

    <section class="card" id="westCard" style="display:none;">
      <div class="bar">
        <div class="bar-meta"><strong>Western · Sun sign</strong></div>
        <div class="pill" id="westPill"></div>
      </div>
      <div class="grid" style="margin-top:.75rem;">
        <div class="sign-card">
          <div class="kicker">Element</div>
          <div class="animal" id="westElement" style="font-size:1.6rem;"></div>
          <div class="meta" id="westElementLabel"></div>
          <p class="body" id="westElementBody"></p>
        </div>
        <div class="sign-card">
          <div class="kicker">Today note</div>
          <div class="meta" id="westSignLabel" style="margin-top:.25rem;"></div>
          <p class="body" id="westSignBody"></p>
        </div>
      </div>
    </section>
  </div>

  <div class="footer-spacer"></div>

  <footer class="footer-bar">
    <div class="footer-inner">
      <a href="https://instagram.com/x.s.seow" target="_blank" rel="noopener noreferrer" aria-label="Instagram" class="social-circle" title="Instagram">

<script>
  (function(){
    const animals = [
      {n:"Rat",cn:"鼠",emoji:"🐭",trait:"Quick-witted, resourceful, versatile, kind",use:"Networking, deals, quick decisions",tone:"var(--metal)"},
      {n:"Ox",cn:"牛",emoji:"🐂",trait:"Dependable, strong, determined, calm",use:"Long-term projects, steady planning",tone:"var(--earth)"},
      {n:"Tiger",cn:"虎",emoji:"🐅",trait:"Brave, competitive, unpredictable, confident",use:"Starting bold moves, showing leadership",tone:"var(--wood)"},
      {n:"Rabbit",cn:"兔",emoji:"🐇",trait:"Gentle, elegant, alert, responsible",use:"Negotiation, rebuilding trust",tone:"var(--wood)"},
      {n:"Dragon",cn:"龍",emoji:"🐉",trait:"Confident, enthusiastic, brave, innovative",use:"Major launches or public appearance",tone:"var(--earth)"},
      {n:"Snake",cn:"蛇",emoji:"🐍",trait:"Enigmatic, intelligent, calm, shy",use:"Due diligence, quiet planning",tone:"var(--fire)"},
      {n:"Horse",cn:"馬",emoji:"🐎",trait:"Animated, active, energetic, independent",use:"Travel, outreach, visibility",tone:"var(--fire)"},
      {n:"Goat",cn:"羊",emoji:"🐑",trait:"Calm, sympathetic, relaxed, creative",use:"Creative work and family matters",tone:"var(--earth)"},
      {n:"Monkey",cn:"猴",emoji:"🐒",trait:"Sharp, curious, playful, clever",use:"Problem solving and learning",tone:"var(--metal)"},
      {n:"Rooster",cn:"雞",emoji:"🐓",trait:"Observant, hardworking, courageous, talented",use:"Presentations, audits, timelines",tone:"var(--metal)"},
      {n:"Dog",cn:"狗",emoji:"🐕",trait:"Loyal, honest, smart, faithful",use:"Agreements, family, loyalty checks",tone:"var(--earth)"},
      {n:"Pig",cn:"豬",emoji:"🐖",trait:"Generous, compassionate, patient, hardworking",use:"Celebrations, abundance planning",tone:"var(--water)"}
    ];
    const signs = [
      {n:"Aries",from:"03-21",to:"04-19",el:"Fire",planet:"Mars",body:"Direct, energetic, and competitive. Best for action and new beginnings."},
      {n:"Taurus",from:"04-20",to:"05-20",el:"Earth",planet:"Venus",body:"Steady, patient, and practical. Best for reliability, routine, and long-term plans."},
      {n:"Gemini",from:"05-21",to:"06-20",el:"Air",planet:"Mercury",body:"Adaptable, curious, and social. Best for messaging, learning, and light communication."},
      {n:"Cancer",from:"06-21",to:"07-22",el:"Water",planet:"Moon",body:"Protective, sensitive, and intuitive. Best for family, home, and private matters."},
      {n:"Leo",from:"07-23",to:"08-22",el:"Fire",planet:"Sun",body:"Confident, expressive, and warm. Best for visibility, leadership, and celebration."},
      {n:"Virgo",from:"08-23",to:"09-22",el:"Earth",planet:"Mercury",body:"Precise, helpful, and careful. Best for details, audits, health, and maintenance."},
      {n:"Libra",from:"09-23",to:"10-22",el:"Air",planet:"Venus",body:"Balanced, diplomatic, and fair. Best for agreements, relationships, and design choices."},
      {n:"Scorpio",from:"10-23",to:"11-21",el:"Water",planet:"Pluto",body:"Intense, strategic, and perceptive. Best for deep work, research, and transformation."},
      {n:"Sagittarius",from:"11-22",to:"12-21",el:"Fire",planet:"Jupiter",body:"Adventurous, optimistic, and free. Best for travel, expansion, and new perspectives."},
      {n:"Capricorn",from:"12-22",to:"01-19",el:"Earth",planet:"Saturn",body:"Disciplined, responsible, and structured. Best for approvals, systems, and careers."},
      {n:"Aquarius",from:"01-20",to:"02-18",el:"Air",planet:"Uranus",body:"Independent, progressive, and inventive. Best for ideas, tech, and community work."},
      {n:"Pisces",from:"02-19",to:"03-20",el:"Water",planet:"Neptune",body:"Compassionate, artistic, and intuitive. Best for healing, art, and quiet reflection."}
    ];
    const years = animals.map((_,i)=>i);

    const nameEl = document.getElementById("visitorName");
    const dobEl = document.getElementById("visitorDob");
    const genderEl = document.getElementById("gender");
    const countryEl = document.getElementById("country");
    const jobEl = document.getElementById("job");
    const tobEl = document.getElementById("tob");
    const eastCard = document.getElementById("eastCard");
    const westCard = document.getElementById("westCard");

    const prefill = () => {
      try {
        const name = localStorage.getItem("mpp.name");
        const dob = localStorage.getItem("mpp.dob");
        const gender = localStorage.getItem("mpp.gender");
        const country = localStorage.getItem("mpp.country");
        const job = localStorage.getItem("mpp.job");
        const tob = localStorage.getItem("mpp.tob");
        if(nameEl && name) nameEl.value = name;
        if(dobEl && dob) dobEl.value = dob;
        if(genderEl && gender) genderEl.value = gender;
        if(countryEl && country) countryEl.value = country;
        if(jobEl && job) jobEl.value = job;
        if(tobEl && tob) tobEl.value = tob;
      } catch(e){}
    };
    prefill();

    document.getElementById("showBtn").addEventListener("click", ()=>{
      const dob = dobEl?.value;
      if(!dob) return alert("Please enter your date of birth.");
      const d = new Date(dob + "T00:00:00");
      const y = d.getFullYear();
      const m = d.getMonth()+1;
      const day = d.getDate();
      const name = nameEl?.value?.trim() || "Visitor";

      const animal = animals[(y - 4) % 12];
      document.getElementById("animalEmoji").textContent = animal.emoji;
      document.getElementById("animalMeta").textContent = `${animal.n} ${animal.cn} · ${y}`;
      document.getElementById("animalBody").textContent = `${name}, ${animal.trait}. ${animal.use}.`;
      document.getElementById("animalUseTitle").textContent = animal.use;
      document.getElementById("animalUseBody").textContent = `In an Eastern view, birthdays starting from the lunar year shape the ${animal.n} perspective. This is a simple symbolic reading.`;

      document.getElementById("eastPill").textContent = `${animal.n} ${animal.cn}`;
      eastCard.style.display = "";

      const mmdd = String(m).padStart(2,"0") + "-" + String(day).padStart(2,"0");
      const sign = signs.find(s => {
        if(s.from > s.to){
          return mmdd >= s.from || mmdd <= s.to;
        }
        return mmdd >= s.from && mmdd <= s.to;
      }) || signs[signs.length-1];
      document.getElementById("westSignLabel").textContent = `${sign.n} · ${sign.el} · ${sign.planet}`;
      document.getElementById("westSignBody").textContent = `${name}, ${sign.body}`;
      document.getElementById("westElement").textContent = sign.el;
      document.getElementById("westElementLabel").textContent = sign.planet;
      document.getElementById("westElementBody").textContent = `${sign.el} signs value ${sign.el.toLowerCase()} themes. ${sign.body}`;
      document.getElementById("westPill").textContent = `${sign.n} · ${sign.el}`;
      westCard.style.display = "";
    });

    ['input','change'].forEach(ev => document.querySelectorAll('#visitorName,#visitorDob,#gender,#country,#job,#tob').forEach(el => el.addEventListener(ev, ()=>{
      try {
        if(el.id==='visitorName') localStorage.setItem("mpp.name", el.value);
        if(el.id==='visitorDob') localStorage.setItem("mpp.dob", el.value);
        if(el.id==='gender') localStorage.setItem("mpp.gender", el.value);
        if(el.id==='country') localStorage.setItem("mpp.country", el.value);
        if(el.id==='job') localStorage.setItem("mpp.job", el.value);
        if(el.id==='tob') localStorage.setItem("mpp.tob", el.value);
      } catch(e){}
    })));
  })();
</script>
<script src="../chatbot.js"></script>
</body>
