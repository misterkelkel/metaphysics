<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="mascot.png">
<title>metaphysics.it.com — 12 Daily Officers</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #181820;
    --surface-2: #1f1f29;
    --border: rgba(255,255,255,.08);
    --text: #f2f2f7;
    --muted: #aaa7b3;
    --accent: #ff8a65;
    --accent-2: #ff6e40;
    --good: #81c784;
    --bad: #e57373;
    --chip-bg: rgba(255,255,255,.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: radial-gradient(1200px 600px at -10% -10%, rgba(255,110,64,.15), transparent), radial-gradient(1000px 500px at 110% 10%, rgba(255,138,101,.12), transparent), var(--bg);
    color: var(--text);
    line-height: 1.55;
  }

  header { max-width: 1100px; margin: 0 auto; padding: 28px 0 6px; }
  header h1 {
    font-family: "Noto Serif SC", "Songti SC", Georgia, "Times New Roman", serif;
    font-size: 1.85rem;
    letter-spacing: -0.02em;
    margin: 0;
  }
  header h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); margin-top: .35rem; font-size: .98rem; }

  .wrap { width: 100%; max-width: 1100px; margin: 0 auto; padding: 22px 0 110px; }
  @media (min-width: 760px) { .wrap { padding-left: 22px; padding-right: 22px; } }

  .card {
    background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-top: 16px;
    backdrop-filter: blur(8px);
  }
  @media (min-width: 760px) { .card { padding: 18px; } }

  .row { display: grid; gap: .75rem; grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 760px) { .row { grid-template-columns: 1fr; } }

  label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .25rem; }
  input, select {
    width: 100%;
    padding: .6rem .8rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font: inherit;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255,110,64,.15); }

  button {
    width: 100%;
    padding: .7rem;
    border: none;
    border-radius: 12px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform .04s ease, opacity .15s ease;
  }
  button:active { transform: translateY(1px); }
  button.secondary { background: linear-gradient(180deg, #6b6b78, #4a4a56); }

  .officer { display: grid; grid-template-columns: 1.2fr .8fr; gap: 1rem; align-items: start; }
  @media (max-width: 760px) { .officer { grid-template-columns: 1fr; } }
  .officer-name { font-size: 1.55rem; font-weight: 800; letter-spacing: -0.01em; background: linear-gradient(180deg, #fff, rgba(255,255,255,.85)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .officer-cn { color: var(--accent); font-size: .95rem; font-weight: 600; }
  .meta { color: var(--muted); font-size: .92rem; margin-top: .2rem; }
  .chips { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: .55rem; }
  .chip { padding: .28rem .6rem; border-radius: 999px; background: var(--chip-bg); border: 1px solid var(--border); font-size: .82rem; color: var(--text); }
  .chip.good { background: rgba(129,199,132,.15); border-color: rgba(129,199,132,.35); color: var(--good); }

  .lists { display: grid; gap: .5rem; margin-top: .6rem; }
  .list-title { font-size: .85rem; color: var(--muted); }
  .list-title.group { margin-top:.4rem; color: var(--text); opacity:.85; }
  ul { margin: .25rem 0 0; padding-left: 1.15rem; }
  li { margin: .15rem 0; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-top: .85rem; }
  @media (max-width: 760px) { .actions { grid-template-columns: 1fr; } }
  .action-box { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 12px; padding: .85rem; }
  .action-box.do { border-top: 3px solid var(--good); }
  .action-box.avoid { border-top: 3px solid var(--bad); }
  .action-box h3 { margin: 0 0 .35rem; font-size: .95rem; }

  .profile-bar { display:flex; justify-content:space-between; gap:1rem; align-items:center; }
  @media (max-width: 760px) { .profile-bar { flex-direction: column; align-items: flex-start; } }
  .pill { display:inline-flex; align-items:center; gap:.35rem; padding: .35rem .7rem; border-radius: 999px; background: var(--chip-bg); border: 1px solid var(--border); font-size: .82rem; color: var(--text); }
  .profile-meta { color: var(--muted); }
  .profile-meta strong { color: var(--text); font-weight: 600; }

  .footer-spacer { height: 90px; }
  footer.footer-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(20,20,26,.85);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--border);
    padding: 14px 18px 16px;
    text-align: center;
    z-index: 100;
  }
  .footer-inner { display: inline-flex; align-items: center; gap: 1.2rem; }
  .social-circle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text); text-decoration: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 8px 18px rgba(0,0,0,.35);
    transition: transform .15s ease, background .15s ease;
  }
  .social-circle:hover { transform: translateY(-2px); background: #25252f; }
  .social-circle svg { width: 19px; height: 19px; fill: currentColor; }

  .timeline { display:grid; gap: .65rem; }
  .day-row { display:grid; grid-template-columns: 120px 1fr; gap:1.25rem; padding: .9rem 1rem; border-radius: 16px; background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); border: 1px solid var(--border); }
  @media (max-width: 760px) { .day-row { grid-template-columns: 1fr; } }
  .day-date { font-weight: 700; color: var(--text); font-size: .95rem; }
  .day-officer { font-weight: 700; color: var(--accent); font-size: 1.05rem; margin-top: .2rem; }
  .day-meta { color: var(--muted); font-size: .9rem; margin-top: .2rem; }
</style>

<script src="lunar.js"></script>
<script>
  (async function(){
    const input = document.getElementById("visitorCountry");
    const tz = document.getElementById("visitorTimezone");
    const hint = document.getElementById("countryHint");
    window.countryHint = hint;
    if(!input || !tz) return;
    if(hint) hint.style.display = "none";
    input.addEventListener("input", () => { if(hint && input.dataset.auto==="1") hint.style.display=""; });
    const zones = ["UTC+8","UTC-4","UTC-5","UTC+0","UTC+1","UTC+5:30","UTC+7","UTC+9","UTC+10"];
    const defaultTz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
    let matched = "";
    const tzToOffset = {"Asia/Singapore":"UTC+8","America/New_York":"UTC-4","US/Eastern":"UTC-4","America/Chicago":"UTC-5","US/Central":"UTC-5","Europe/London":"UTC+0","Asia/Kolkata":"UTC+5:30","Asia/Bangkok":"UTC+7","Asia/Shanghai":"UTC+8","Asia/Hong_Kong":"UTC+8","Asia/Tokyo":"UTC+9","Australia/Sydney":"UTC+10","Pacific/Auckland":"UTC+12"};
    matched = tzToOffset[defaultTz] || "UTC+8";
    tz.innerHTML = zones.map(x=>`<option value="${x}" ${x===(matched||"UTC+8")?"selected":""}>${x}</option>`).join("");
    try {
      const res = await fetch("https://ipwho.is/", { signal: AbortSignal.timeout(4000) });
      if(!res.ok) throw new Error("non-200");
      const data = await res.json();
      const countryName = data?.country_name || data?.country || data?.nation;
      if(countryName) {
        input.value = countryName;
        input.dataset.auto = "1";
        if(hint) { hint.textContent = hint.textContent ? `Detected: ${countryName} — editable` : `Detected: ${countryName}`; hint.style.display = ""; }
      }
      const mapped = data?.timezone && tzToOffset[data.timezone] ? tzToOffset[data.timezone] : matched;
      tz.value = mapped;
    } catch(e) { /* keep empty */ }
  })();
</script>
<script>
  (function(){
    const keys = { visitorName: 'mpp.name', visitorDob: 'mpp.dob', visitorCountry: 'mpp.country', visitorTimezone: 'mpp.tz', weekStart: 'mpp.weekStart' };
    const restore = () => {
      Object.entries(keys).forEach(([id, k]) => {
        const el = document.getElementById(id); if(!el) return;
        const v = localStorage.getItem(k); if(v) el.value = v;
      });
    };
    restore();
    const save = () => {
      Object.entries(keys).forEach(([id, k]) => {
        const el = document.getElementById(id); if(!el) return;
        const v = el.value; if(v) localStorage.setItem(k, v);
      });
    };
    ['input','change'].forEach(ev => document.querySelectorAll('#visitorName,#visitorDob,#visitorCountry,#visitorTimezone,#weekStart').forEach(el => el.addEventListener(ev, save)));
  })();
</script>
<script>
const DATA = [
  { en: "Establish", cn: "建", workDo: ["Start projects","Important decisions","Contracts","Meetings","Planning"], workAvoid: ["Arguments","Untested launches","Scope creep"], familyDo: ["Family meetings","Set goals together","Assign chores"], familyAvoid: ["Confrontation","Rushed travel"], clash: "豬", clashDir: "West", element: "Wood", note: "Good for beginnings and structure. Avoid confrontation." },
  { en: "Remove", cn: "除", workDo: ["Cancel bad plans","Clear backlog","Pay debts","Habits reset"], workAvoid: ["Celebrations","Grand openings"], familyDo: ["Declutter home","End bad patterns","Short trips"], familyAvoid: ["Big parties"], clash: "鼠", clashDir: "South", element: "Wood", note: "Best for removal, healing, and endings." },
  { en: "Full", cn: "滿", workDo: ["Deliver results","Collect payments","Celebrate wins"], workAvoid: ["New contracts","Overcommit"], familyDo: ["Gather together","Celebrate milestones","Share meals"], familyAvoid: ["Long trips","Big spending"], clash: "牛", clashDir: "East", element: "Earth", note: "Auspicious for rewards and abundance." },
  { en: "Balance", cn: "平", workDo: ["Routine work","Maintenance","Study","Publishing"], workAvoid: ["High-stakes deals","Construction start"], familyDo: ["Steady routine","Home projects","Together time"], familyAvoid: ["Big events","Weddings"], clash: "虎", clashDir: "North", element: "Earth", note: "Neutral day; stay steady and avoid risks." },
  { en: "Stable", cn: "定", workDo: ["Agreements","Scheduling","Steady investments","Meetings"], workAvoid: ["Funerals","Risky bets","Disputes"], familyDo: ["Resolve commitments","Plan ahead","Quality time"], familyAvoid: ["Risk-taking","Arguments"], clash: "兔", clashDir: "West", element: "Metal", note: "Good for settling matters and commitments." },
  { en: "Initiate", cn: "執", workDo: ["Follow-through","Approvals","Administrative work","Offerings"], workAvoid: ["Travel","Funerals","Moving"], familyDo: ["Family rituals","House rules","Planning"], familyAvoid: ["Travel","Moving homes"], clash: "龍", clashDir: "South", element: "Metal", note: "Favors discipline and steady effort." },
  { en: "Destruction", cn: "破", workDo: ["Problem-solving","Audits","Release old tools","End bad projects"], workAvoid: ["Weddings","Promises","Celebrations"], familyDo: ["Resolve conflicts","Release grudges","Clean up"], familyAvoid: ["New promises","Celebrations"], clash: "蛇", clashDir: "East", element: "Earth", note: "Use carefully; good for endings, not beginnings." },
  { en: "Danger", cn: "危", workDo: ["Risk review","Defensive planning","Keep low profile"], workAvoid: ["New contracts","Long journeys","Big launches"], familyDo: ["Safety checks","Low-key time","Support"], familyAvoid: ["Big ceremonies","Travel"], clash: "馬", clashDir: "North", element: "Water", note: "Keep caution. Do not take chances." },
  { en: "Success", cn: "成", workDo: ["Business deals","Seal agreements","Completion","Deliveries"], workAvoid: ["Lawsuits","Surgery","Conflict"], familyDo: ["Celebrations","Mergers","Gatherings"], familyAvoid: ["Conflict","Surgery timing"], clash: "羊", clashDir: "West", element: "Water", note: "Auspicious for outcomes and celebrations." },
  { en: "Receive", cn: "收", workDo: ["Inventory","Collections","Filing","Returns"], workAvoid: ["Investments","Moving","Marriage timing"], familyDo: ["Sorting home","Harvesting together","Bonding"], familyAvoid: ["Investments","Moving"], clash: "猴", clashDir: "South", element: "Metal", note: "Best for closure and consolidation." },
  { en: "Open", cn: "開", workDo: ["New business","Opening events","Public launches","Travel"], workAvoid: ["Big repairs","Funerals at family"], familyDo: ["Travel together","New beginnings","Public events with family"], familyAvoid: ["Burying memories","Ignoring repairs"], clash: "雞", clashDir: "East", element: "Metal", note: "Great for openings, fortune, and travel." },
  { en: "Close", cn: "閉", workDo: ["Finish old tasks","Solo work","Quiet focus"], workAvoid: ["Public events","Meetings","New openings"], familyDo: ["Rest at home","Quiet time","Close out family matters"], familyAvoid: ["Big meetings","Starting new ventures"], clash: "狗", clashDir: "North", element: "Earth", note: "Time to finish quietly, not to begin." }
];

const ORDER = ["建","除","滿","平","定","執","破","危","成","收","開","閉"];
const WEEKDAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function toMonday(d){ 
  const dt=new Date(d); const day=dt.getDay(); 
  const diff=dt.getDate()-day+(day===0?-6:1); 
  dt.setDate(diff); dt.setHours(0,0,0,0); return dt; 
}
function next7(start){ const out=[]; for(let i=0;i<7;i++){ const d=new Date(start); d.setDate(start.getDate()+i); out.push(d);} return out; }
function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function animal(y){ const m=["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"]; return m[((y-4)%12+12)%12]; }

const planBtn = document.getElementById("planBtn");
const weekStartInput = document.getElementById("weekStart");
const weeklySection = document.getElementById("weekly");
const weekGrid = document.getElementById("weekGrid");
const weeklyHeader = document.getElementById("weeklyHeader");
const weeklyProfile = document.getElementById("weeklyProfile");
const tzInput = document.getElementById("visitorTimezone");

function officerForDate(y, m, d) {
  if (typeof Solar !== "undefined" && Solar && typeof Solar.fromDate === "function") {
    try {
      const dObj = new Date(y, m - 1, d);
      const s = Solar.fromDate(dObj);
      const l = s.getLunar();
      const raw = l.getZhiXing();
      const match = DATA.find(item => item.cn === raw);
      if (match) return match;
    } catch (e) { console.error(e); }
  }
  // Fallback map
  const idx = ((y * 13 + m) * 31 + d) % 12;
  return DATA[idx];
}

function doPlan(){
  const nameEl = document.getElementById("visitorName");
  const dobEl = document.getElementById("visitorDob");
  const countryEl = document.getElementById("visitorCountry");
  const tzEl = tzInput;
  const name = nameEl?.value?.trim();
  const dob = dobEl?.value;
  const country = countryEl?.value?.trim();
  const tz = (tzEl && tzEl.value) ? tzEl.value : "UTC+8";

  if(!name){
    if(weeklySection) weeklySection.style.display="none";
    return alert("Please enter your name.");
  }
  
  const dobY = dob ? Number(String(dob).split("-")[0]) : null;
  const zodiac = dobY ? animal(dobY) : null;
  const profile = [name, country?`· ${country}`:"", zodiac?`· ${zodiac}`:""].filter(Boolean).join(" ");
  
  if(weeklyProfile) weeklyProfile.innerHTML = `<span class="pill"><strong>Profile</strong></span> <span class="pill">${profile}</span>`;
  
  const start = weekStartInput.value ? new Date(weekStartInput.value + "T00:00:00") : toMonday(new Date());
  if(weeklyHeader) weeklyHeader.innerHTML = `<span class="pill">${fmt(start)} → ${fmt(new Date(start.getFullYear(), start.getMonth(), start.getDate()+6))}</span><span class="pill">${tz}</span>`;
  
  const days = next7(start);
  if(!weekGrid) return;
  weekGrid.innerHTML = "";

  days.forEach(d => {
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    
    const item = officerForDate(y, m, day);
    const officerIndex = DATA.indexOf(item);
    
    const row = document.createElement("div");
    row.className = "day-row";
    row.innerHTML = `
      <div>
        <div class="day-date">${WEEKDAYS[d.getDay()]}, ${fmt(d)}</div>
        <div class="day-officer">${item.cn} / ${item.en}</div>
        <div class="day-meta">Cycle ${officerIndex + 1}/12 · Clash ${item.clash} · ${item.element} · ${item.clashDir}</div>
      </div>
      <div>
        <div class="lists" style="margin-top:0;">
          <div class="list-title">Do — Work</div>
          <ul>${item.workDo.map(x=>`<li>${x}</li>`).join("")}</ul>
          <div class="list-title" style="margin-top:.4rem;">Do — Family</div>
          <ul>${item.familyDo.map(x=>`<li>${x}</li>`).join("")}</ul>
          <div class="list-title group">Avoid — Work</div>
          <ul>${item.workAvoid.map(x=>`<li>${x}</li>`).join("")}</ul>
          <div class="list-title group">Avoid — Family</div>
          <ul>${item.familyAvoid.map(x=>`<li>${x}</li>`).join("")}</ul>
        </div>
      </div>`;
    weekGrid.appendChild(row);
  });

  if(weeklySection) { weeklySection.style.display = ""; }
}

planBtn?.addEventListener("click", (e) => {
  e.preventDefault();
  doPlan();
});

// Set default inputs for today's date context
const today = new Date();
weekStartInput.value = fmt(today);
</script>
