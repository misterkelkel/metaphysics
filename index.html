<script>
  (function(){
    const ls = window.localStorage;
    const keys = {
      visitorName: 'mpp.name',
      visitorDob: 'mpp.dob',
      visitorCountry: 'mpp.country',
      visitorJob: 'mpp.job',
      visitorTimezone: 'mpp.tz',
      weekStart: 'mpp.weekStart',
      gender: 'mpp.gender',
      visitorLang: 'mpp.lang',
      tob: 'mpp.tob'
    };
    const ids = Object.keys(keys);
    function save(id){ const el = document.getElementById(id); if(!el) return; try { if(el.value) ls.setItem(keys[id], el.value); else ls.removeItem(keys[id]); } catch(e){} }
    function prefill(){
      ids.forEach(id=>{
        const el = document.getElementById(id);
        if(!el) return;
        const val = ls.getItem(keys[id]);
        if(val) el.value = val;
      });
      if(window.mppLang && typeof window.mppLang.setLang === 'function'){
        const savedLang = ls.getItem('mpp.lang');
        if(savedLang==='en'||savedLang==='zh'||savedLang==='both') window.mppLang.setLang(savedLang);
      }
    }
    ['input','change'].forEach(ev=>{
      ids.forEach(id=>{
        const el = document.getElementById(id);
        if(!el) return;
        el.addEventListener(ev, ()=>save(id));
      });
    });
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', prefill); else prefill();
  })();
</script>
