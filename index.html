<script src="lunar.js"></script>
<script>
  (async function(){
    const input = document.getElementById("visitorCountry");
    const tz = document.getElementById("visitorTimezone");
    const hint = document.getElementById("countryHint");
    window.countryHint = hint;
    if(!input || !tz) return;
    if(hint) hint.style.display = "none";
    input.addEventListener("input", () => { if(hint && input.dataset.auto==="1") hint.style.display=""; });
    const zones = ["UTC+8","UTC-4","UTC-5","UTC+0","UTC+1","UTC+5:30","UTC+7","UTC+9","UTC+10"];
    const defaultTz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
    let matched = "";
    const tzToOffset = {"Asia/Singapore":"UTC+8","America/New_York":"UTC-4","US/Eastern":"UTC-4","America/Chicago":"UTC-5","US/Central":"UTC-5","Europe/London":"UTC+0","Asia/Kolkata":"UTC+5:30","Asia/Bangkok":"UTC+7","Asia/Shanghai":"UTC+8","Asia/Hong_Kong":"UTC+8","Asia/Tokyo":"UTC+9","Australia/Sydney":"UTC+10","Pacific/Auckland":"UTC+12"};
    matched = tzToOffset[defaultTz] || "UTC+8";
    tz.innerHTML = zones.map(x=>`<option value="${x}" ${x===(matched||"UTC+8")?"selected":""}>${x}</option>`).join("");
    try {
      const res = await fetch("https://ipwho.is/", { signal: AbortSignal.timeout(4000) });
      if(!res.ok) throw new Error("non-200");
      const data = await res.json();
      const countryName = data?.country_name || data?.country || data?.nation;
      if(countryName) {
        input.value = countryName;
        input.dataset.auto = "1";
        if(hint) { hint.textContent = hint.textContent ? `Detected: ${countryName} — editable` : `Detected: ${countryName}`; hint.style.display = ""; }
      }
      const mapped = data?.timezone && tzToOffset[data.timezone] ? tzToOffset[data.timezone] : matched;
      tz.value = mapped;
    } catch(e) { /* keep empty */ }
  })();
</script>
<script>
  (function(){
    const keys = { visitorName: 'mpp.name', visitorDob: 'mpp.dob', visitorCountry: 'mpp.country', visitorTimezone: 'mpp.tz', weekStart: 'mpp.weekStart' };
    const restore = () => {
      Object.entries(keys).forEach(([id, k]) => {
        const el = document.getElementById(id); if(!el) return;
        const v = localStorage.getItem(k); if(v) el.value = v;
      });
    };
    restore();
    const save = () => {
      Object.entries(keys).forEach(([id, k]) => {
        const el = document.getElementById(id); if(!el) return;
        const v = el.value; if(v) localStorage.setItem(k, v);
      });
    };
    ['input','change'].forEach(ev => document.querySelectorAll('#visitorName,#visitorDob,#visitorCountry,#visitorTimezone,#weekStart').forEach(el => el.addEventListener(ev, save)));
  })();
</script>

const WEEKDAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function next7(start){ const out=[]; for(let i=0;i<7;i++){ const d=new Date(start); d.setDate(start.getDate()+i); out.push(d);} return out; }
function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function animal(y){ const m=["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"]; return m[((y-4)%12+12)%12]; }

const planBtn = document.getElementById("planBtn");
const weekStartInput = document.getElementById("weekStart");
const weeklySection = document.getElementById("weekly");
const weekGrid = document.getElementById("weekGrid");
const weeklyHeader = document.getElementById("weeklyHeader");
const weeklyProfile = document.getElementById("weeklyProfile");

function officerForDate(y, m, d) {
  if (typeof Solar !== "undefined" && Solar && typeof Solar.fromDate === "function") {
    try {
      const dObj = new Date(y, m - 1, d);
      const s = Solar.fromDate(dObj);
      const l = s.getLunar();
      const raw = l.getZhiXing();
      const match = DATA.find(item => item.cn === raw);
      if (match) return match;
    } catch (e) { console.error(e); }
  }
  // Safe default fallback if library fails
  return DATA[0];
}

function doPlan(){
  const nameEl = document.getElementById("visitorName");
  const dobEl = document.getElementById("visitorDob");
  const countryEl = document.getElementById("visitorCountry");
  const tzEl = document.getElementById("visitorTimezone");
  const name = nameEl?.value?.trim();
  const dob = dobEl?.value;
  const country = countryEl?.value?.trim();
  const tz = (tzEl && tzEl.value) ? tzEl.value : "UTC+8";

  if(!name){
    if(weeklySection) weeklySection.style.display="none";
    return alert("Please enter your name.");
  }
  
  const dobY = dob ? Number(String(dob).split("-")[0]) : null;
  const zodiac = dobY ? animal(dobY) : null;
  const profile = [name, country?`· ${country}`:"", zodiac?`· ${zodiac}`:""].filter(Boolean).join(" ");
  
  if(weeklyProfile) weeklyProfile.innerHTML = `<span class="pill"><strong>Profile</strong></span> <span class="pill">${profile}</span>`;
  
  // Parse date properly without timezone shifting issues
  let start = new Date();
  if (weekStartInput.value) {
    const parts = weekStartInput.value.split("-");
    start = new Date(parts[0], parts[1] - 1, parts[2]);
  }
  
  if(weeklyHeader) weeklyHeader.innerHTML = `<span class="pill">${fmt(start)} → ${fmt(new Date(start.getFullYear(), start.getMonth(), start.getDate()+6))}</span><span class="pill">${tz}</span>`;
  
  const days = next7(start);
  if(!weekGrid) return;
  weekGrid.innerHTML = "";

  days.forEach(d => {
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    
    const item = officerForDate(y, m, day);
    const officerIndex = DATA.indexOf(item);
    
    const row = document.createElement("div");
    row.className = "day-row";
    row.innerHTML = `
      <div>
        <div class="day-date">${WEEKDAYS[d.getDay()]}, ${fmt(d)}</div>
        <div class="day-officer">${item.cn} / ${item.en}</div>
        <div class="day-meta">Cycle ${officerIndex + 1}/12 · Clash ${item.clash} · ${item.element} · ${item.clashDir}</div>
      </div>
      <div>
        <div class="lists" style="margin-top:0;">
          <div class="list-title">Do — Work</div>
          <ul>${item.workDo.map(x=>`<li>${x}</li>`).join("")}</ul>
          <div class="list-title" style="margin-top:.4rem;">Do — Family</div>
          <ul>${item.familyDo.map(x=>`<li>${x}</li>`).join("")}</ul>
          <div class="list-title group">Avoid — Work</div>
          <ul>${item.workAvoid.map(x=>`<li>${x}</li>`).join("")}</ul>
          <div class="list-title group">Avoid — Family</div>
          <ul>${item.familyAvoid.map(x=>`<li>${x}</li>`).join("")}</ul>
        </div>
      </div>`;
    weekGrid.appendChild(row);
  });

  if(weeklySection) { weeklySection.style.display = ""; }
}

planBtn?.addEventListener("click", (e) => {
  e.preventDefault();
