<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>metaphysics.it.com — Date Selection (Ze Ri)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling for the drop-down groups */
    optgroup {
      background: var(--surface-2);
      color: var(--accent-gold);
      font-weight: 600;
    }
    option {
      background: var(--card);
      color: var(--text);
      font-weight: normal;
    }
    .activity-badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 0.75rem;
      text-transform: uppercase;
    }
    .badge-optimal { background: rgba(129, 199, 132, 0.15); color: #81c784; border: 1px solid rgba(129, 199, 132, 0.3); }
    .badge-avoid { background: rgba(229, 115, 115, 0.15); color: #e57373; border: 1px solid rgba(229, 115, 115, 0.3); }
    .clash-card { background: rgba(229, 115, 115, 0.08); border: 1px solid rgba(229, 115, 115, 0.2) !important; }
    .clash-alert { margin-top: 0.6rem; padding: 0.5rem 0.75rem; border-radius: 6px; background: rgba(229, 115, 115, 0.12); color: #e57373; font-size: 0.82rem; font-weight: 500; border-left: 3px solid #e57373; }
    .strategic-box { background: rgba(255, 255, 255, 0.03); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.92rem; line-height: 1.45; }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <div class="nav-left">
        <a class="brand" href="index.html">metaphysics.it.com</a>
        <span class="tag">Date Selection (Ze Ri)</span>
      </div>
      <div class="nav-right">
        <select id="visitorLang" aria-label="Language" style="margin-top:0; padding:0.4rem 0.6rem; width:auto;">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="both">中英</option>
        </select>
      </div>
    </nav>
  </header>

  <div class="wrap">
    <section class="card">
      <h2>Profile & Strategic Target</h2>
      <div class="row">
        <div><label for="visitorName">Name</label><input type="text" id="visitorName"></div>
        <div><label for="visitorJob">Job Title / Focus</label><input type="text" id="visitorJob"></div>
      </div>
      <div class="row" style="margin-top:.5rem;">
        <div><label for="weekStart">Starting Selection From</label><input type="date" id="weekStart"></div>
        <div>
          <label for="zeRiActivity">Strategic Activity Target</label>
          <select id="zeRiActivity">
            <optgroup label="TRANSACTIONAL & ACTIVE MILESTONES">
              <option value="launch">Business Launch & Grand Opening (开业)</option>
              <option value="contract">Contract Signing & Legal Deals (签约)</option>
              <option value="deployment">System Deployment & Tech Go-Live (部署)</option>
              <option value="kickoff">Major Project Kickoff & Breaking Ground (开工)</option>
              <option value="negotiation">High-Stakes Negotiation & Pitching (谈判)</option>
              <option value="purchase">Major Asset & Equipment Purchase (交易)</option>
            </optgroup>
            <optgroup label="SANCTUARY & RELATIONSHIP MILESTONES">
              <option value="wedding">Wedding Ceremony & Banquet (嫁娶)</option>
              <option value="rom">Legal ROM Registration / Civil Union (注册结婚)</option>
              <option value="engagement">Engagement Rituals & Guo Da Li (过大礼)</option>
              <option value="bed">Setting the Nuptial Bed (安床)</option>
              <option value="move">Property Move & Space Relocation (入宅)</option>
              <option value="renovation">Internal Renovation & Layout Updates (修造)</option>
            </optgroup>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Companion Compatibility Parameters (Optional)</h2>
      <div style="margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px dashed var(--border);">
        <div class="row">
          <div style="flex: 2;"><label for="comp1Name">Partner 1 Name</label><input type="text" id="comp1Name" placeholder="Name"></div>
          <div><label for="comp1Gender">Gender</label>
            <select id="comp1Gender">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
        <div class="row" style="margin-top: .5rem;">
          <div><label for="comp1Dob">Date of Birth</label><input type="date" id="comp1Dob"></div>
          <div><label for="comp1Tob">Time of Birth</label><input type="time" id="comp1Tob"></div>
        </div>
      </div>

      <div style="margin-bottom: 1rem;">
        <div class="row">
          <div style="flex: 2;"><label for="comp2Name">Partner 2 Name</label><input type="text" id="comp2Name" placeholder="Name"></div>
          <div><label for="comp2Gender">Gender</label>
            <select id="comp2Gender">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
        <div class="row" style="margin-top: .5rem;">
          <div><label for="comp2Dob">Date of Birth</label><input type="date" id="comp2Dob"></div>
          <div><label for="comp2Tob">Time of Birth</label><input type="time" id="comp2Tob"></div>
        </div>
      </div>
      <button id="planBtn" class="primary" style="margin-top:1.2rem;" type="button">Calculate Optimal Selection Window</button>
    </section>

    <section class="card" id="weekly" style="display:none;">
      <h2>7-Day Analysis Timeline</h2>
      <div id="weekGrid" class="timeline"></div>
    </section>
  </div>
  <script src="zeri-plan.js"></script>
</body>
</html>
